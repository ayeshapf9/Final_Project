 </head>

 <body class="contact">
   <header>
<div class="header container"> 
  <a class="logo" href="index.html">Technical Innovations</a> 
  <input type="checkbox" id="nav-toggle">
    <label for="nav-toggle" class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </label>
  <nav class="nav-links" aria-label="Main navigation">
   <ul class="nav-list">
        <li><a href="index.html">Index</a></li> 
        <li><a href="about.this.site.html">About</a></li>

        <li><a href="satellite.html">Satellite</a></li> 
        
     </ul>
    </nav>
   </div>
  </header>
  <main class="container"> 

  <div class="hero-image">

  <h1 class="hero">Contact Information</h1>


  </div>


  <h1 class="green">Ways to Contact</h1> 
 
    <div class="contact-form-section">
 
        
        <div class="form-group">
          <label for="name">Full Name:</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address:</label>
          <input type="email" id="email" name="email" required>
        </div>

        
        <div class="form-group">
          <label for="bestTime">Best time to reach me:</label>
          <select id="bestTime" name="bestTime">
            <option value="">Please select a time</option>
            <option value="morning">Morning (8AM - 12PM)</option>
            <option value="afternoon">Afternoon (12PM - 5PM)</option>
            <option value="evening">Evening (5PM - 8PM)</option>
          </select>
        </div>

        
        <fieldset>
          <legend>Best way to reach me:</legend>
          <div class="radio-option">
            <input type="radio" id="contactEmail" name="contactMethod" value="Email">
            <label for="contactEmail">Email</label>
          </div>
          <div class="radio-option">
            <input type="radio" id="contactPhone" name="contactMethod" value="Phone">
            <label for="contactPhone">Phone Call</label>
          </div>
          <div class="radio-option">
            <input type="radio" id="contactText" name="contactMethod" value="Text">
            <label for="contactText">Text Message</label>
          </div>
        </fieldset>

        
        <fieldset>
          <legend>Let me know about:</legend>
          <div class="checkbox-option">
            <input type="checkbox" id="updates" name="notify" value="Updates">
            <label for="updates">News & Updates</label>
          </div>
          <div class="checkbox-option">
            <input type="checkbox" id="offers" name="notify" value="Offers">
            <label for="offers">Special Offers</label>
          </div>
          <div class="checkbox-option">
            <input type="checkbox" id="events" name="notify" value="Events">
            <label for="events">Upcoming Events</label>
          </div>
        </fieldset>

       

  </main>

  </body>
</html>
